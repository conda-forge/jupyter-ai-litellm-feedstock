context:
  version: "0.0.2"

package:
  name: jupyter-ai-litellm
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-ai-litellm/jupyter_ai_litellm-${{ version }}.tar.gz
  sha256: 99a4ecb46026a6ee0bcea34b969d1703823224cb0c1a8b1f64891cf3208233f8

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.5.0
  run:
    - python >=${{ python_min }}
    - jupyter_server >=2.4.0,<3
    - litellm >=1.73,<2

tests:
  - python:
      imports:
        - jupyter_ai_litellm
      pip_check: true
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/jupyter-ai-contrib/jupyter-ai-litellm
  summary: "LiteLLM based model abstraction for Jupyter AI"
  license: BSD-3-Clause
  license_file: LICENSE
  documentation: https://jupyter-ai.readthedocs.io/
  repository: https://github.com/jupyter-ai-contrib/jupyter-ai-litellm

extra:
  recipe-maintainers:
    - 3coins
    - dlqqq
    - andrii-i
